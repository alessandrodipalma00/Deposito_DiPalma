<!DOCTYPE html>

<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title></title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="EsercizioPomeriggio.css">
    </head>
    <body>
       
       <div class="contenitore">
        <div class="box">ora sto scrivendo all'interno del contenitore</div>
       </div> 
       <!-- qui dentro il contenitore ho messo box che ha una posizione assoluta, quindi non è più in relazione con il contenitore -->


       <!-- qui ora sto facendo una griglia base -->
       <div class="container">
        <div class="item">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
       </div>

       <!-- ora in questo div provo il flex -->
        <div class="container_flex">
            <div class="item item_flex">1</div>
            <div class="item item_flex">2</div>
            <div class="item item_flex">3</div>
        </div>

      
        <!-- in quest'altro div proviamo una griglia composta da 3 colonne e 2 righe -->
         <div class="container_nuovagriglia">
            <div class="item item1">A</div>
            <div class="item item2">B</div>
            <div class="item">C</div>
         </div>


         <!-- griglia ad area -->
           <div class="container_area">
            <div class="header">Header</div>
            <div class="sidebar">Sidebar</div>
            <div class="content">Content</div>
            <div class="footer">Footer</div>
           </div>

    </body>
</html>
