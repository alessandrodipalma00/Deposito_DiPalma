<!DOCTYPE html>

<html>
    <head>
        <title>Pagina di esempio</title>
    </head>

    <body>
        <!-- <input type="email">
        <input type="number">
        <input type="checkbox"> -->

        <div id="cont" class="box principale" title="Contenitore principale">
            <p class="testo" data-id="123">Contenuto di esempio</p>
        </div> <!-- l'id deve essere unico. non ci possono essere due elementi con lo stesso id-->
        

        <div>
            <label for="email">Email</label>
            <input type="email" id="email">
        </div>

            <div>
                <!-- il placeholder è molto importante, mostra un testo di esempio all'interno del campo-->
                <input type="text" placeholder="inserisci il tuo Nome" name="Nome">
                <input type="text" name="cognome">
                <input type="radio" name="ruolo" value="studente">
                <input type="radio" name="ruolo" value="docente">
            
            </div> 
            <!-- il required indica un campo che deve essere obbligatoriamente compilato-->
            <input type="email" required>

    </body>
</html>
